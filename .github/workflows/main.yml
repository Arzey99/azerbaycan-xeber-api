name: Haberleri Guncelle

on:
  schedule:
    - cron: '0 * * * *' # Her saat başı botu otomatik çalıştırır
  workflow_dispatch: # İstersen ayarlardan manuel çalıştırma butonu ekler

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu Klonla
        uses: actions/checkout@v3

      - name: Python Kur
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Botu Calistir
        run: python bot.py

      - name: Yeni Haberleri Kaydet (Commit)
        run: |
          git config --global user.name "Haber Botu"
          git config --global user.email "bot@xeberapp.com"
          git add haberler.json
          git commit -m "Haberler güncellendi" || echo "Yeni haber yok, sistem stabil."
          git push
